<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Replify</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <button class="icon-button" id="header-settings-btn">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 0">auto_awesome</span>
            </button>
            <h1 class="font-headline-sm">Replify</h1>
            <button class="icon-button" id="header-preferences-btn">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </header>

        <main id="generator-view">
            <div class="generator-container">
                <h2 class="font-label-md section-title">Generate Replies</h2>
                <div class="form-group mb">
                    <label class="font-label-sm" for="x-post-url">X (Twitter) Post Link</label>
                    <input type="url" id="x-post-url" class="font-body-sm text-input" readonly placeholder="Open a post on X to auto-detect...">
                    <div id="no-post-message" class="no-post-message font-label-sm" style="display:none">
                        <span class="material-symbols-outlined" style="font-size:14px">info</span>
                        Navigate to a post on X, then open Replify
                    </div>
                </div>
                <div class="action-button-container">
                    <button id="generate-btn" class="action-button font-label-md" disabled>
                        <span class="material-symbols-outlined">auto_awesome</span>
                        Generate Replies
                    </button>
                </div>
            </div>

            <div id="loading-spinner" class="loading-spinner">
                <span class="material-symbols-outlined">sync</span>
                <p class="font-body-sm">Fetching post &amp; generating...</p>
            </div>

            <div id="results-container"></div>

            <div id="history-section">
                <div class="history-header">
                    <span class="font-label-md section-title" style="margin-bottom:0">Recent Replies</span>
                    <button id="clear-history-btn" class="history-clear-btn font-label-sm" title="Clear all history">
                        <span class="material-symbols-outlined" style="font-size:14px">delete_sweep</span>
                        Clear
                    </button>
                </div>
                <div id="history-empty-state" class="history-empty-state">
                    <span class="material-symbols-outlined history-empty-icon">forum</span>
                    <p class="font-label-md history-empty-title">No history yet</p>
                    <p class="font-body-sm history-empty-desc">Generated replies will appear here so you can re-copy them anytime.</p>
                </div>
                <div id="history-list"></div>
            </div>
        </main>

        <main id="settings-view" style="display:none">
            <h2 class="font-label-md section-title">Preferences</h2>
            <div class="settings-card">
                <div class="form-group">
                    <label class="font-label-sm" for="tone-select">Tone</label>
                    <div class="select-wrapper">
                        <select id="tone-select" class="font-body-sm">
                            <option value="friendly">Friendly</option>
                            <option selected value="professional">Professional</option>
                            <option value="sarcastic">Sarcastic</option>
                            <option value="blunt">Blunt</option>
                            <option value="deep">Deep</option>
                            <option value="roast">Roast</option>
                            <option value="custom">Custom</option>
                        </select>
                        <span class="material-symbols-outlined select-icon">expand_more</span>
                    </div>
                </div>
                <div class="form-group">
                    <div class="slider-header">
                        <label class="font-label-sm" for="variations-slider">Variations per Generation</label>
                        <span class="font-label-md slider-value" id="variations-val">3</span>
                    </div>
                    <div class="slider-container">
                        <input id="variations-slider" max="5" min="1" type="range" value="3">
                    </div>
                </div>
                <div class="form-group">
                    <label class="font-label-sm" for="length-select">Reply Length</label>
                    <div class="select-wrapper">
                        <select id="length-select" class="font-body-sm">
                            <option value="very_short">Very Short (&lt; 50 chars)</option>
                            <option selected value="short">Short &amp; Concise (&lt; 80 chars)</option>
                            <option value="long">Long (&lt; 150 chars)</option>
                        </select>
                        <span class="material-symbols-outlined select-icon">expand_more</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="font-label-sm" for="instructions-textarea">
                        Custom Context
                        <span class="material-symbols-outlined info-icon" style="font-variation-settings:'FILL' 1">info</span>
                    </label>
                    <textarea id="instructions-textarea" class="font-body-sm"
                        placeholder="e.g. Never use hashtags. Always agree with the original poster first."
                        rows="3"></textarea>
                </div>
                <div class="divider"></div>
                <label class="toggle-label">
                    <div class="toggle-text-container">
                        <span class="font-label-md toggle-title">Include Emojis</span>
                        <span class="font-body-sm toggle-desc">Let AI sprinkle relevant emojis</span>
                    </div>
                    <div class="toggle-wrapper">
                        <input class="sr-only" type="checkbox" checked>
                        <div class="toggle-bg"><div class="toggle-thumb"></div></div>
                    </div>
                </label>
            </div>
            <div class="action-button-container">
                <button id="save-settings-btn" class="action-button font-label-md">
                    <span class="material-symbols-outlined">save</span>
                    Save Settings
                </button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
