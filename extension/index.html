<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>X Reply Assistant - Settings</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Extension Container (Constrained Width) -->
    <div class="app-container">
        <!-- TopAppBar -->
        <header>
            <button class="icon-button" id="header-settings-btn">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">auto_awesome</span>
            </button>
            <h1 class="font-headline-sm">Replify</h1>
            <button class="icon-button" id="header-preferences-btn">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </header>

        <!-- Generator View -->
        <main id="generator-view">
            <div class="generator-container" style="padding: 16px; background-color: var(--surface-container-low); border-radius: 12px; border: 1px solid var(--outline-variant); margin-bottom: 16px;">
                <h2 class="font-label-md section-title" style="margin-bottom: 12px;">Generate Replies</h2>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="font-label-sm" for="x-post-url" style="display: block; margin-bottom: 8px;">X (Twitter) Post Link</label>
                    <input type="url" id="x-post-url" class="font-body-sm text-input" placeholder="https://x.com/username/status/..." style="width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--outline-variant); background-color: var(--surface-container); color: var(--on-surface); box-sizing: border-box; outline: none; transition: border-color 0.2s;" />
                </div>
                
                <div class="action-button-container">
                    <button id="generate-btn" class="action-button font-label-md" style="width: 100%;">
                        <span class="material-symbols-outlined">auto_awesome</span>
                        Generate Replies
                    </button>
                </div>
            </div>

            <div id="loading-spinner" style="display: none; text-align: center; padding: 24px 0;">
                <span class="material-symbols-outlined" style="animation: spin 1s linear infinite; font-size: 24px; color: var(--primary);">sync</span>
                <p class="font-body-sm" style="margin-top: 8px; color: var(--on-surface-variant);">Fetching post & generating...</p>
            </div>
            
            <div id="results-container">
                <!-- Generated replies will appear here -->
            </div>
        </main>

        <main id="settings-view" style="display: none;">
            <h2 class="font-label-md section-title" style="margin-bottom: 8px;">Preferences</h2>

            <!-- Settings Card Form -->
            <div class="settings-card">

                <!-- Tone Dropdown -->
                <div class="form-group">
                    <label class="font-label-sm" for="tone-select">Tone</label>
                    <div class="select-wrapper">
                        <select id="tone-select" class="font-body-sm">
                            <option value="friendly">Friendly</option>
                            <option selected value="professional">Professional</option>
                            <option value="sarcastic">Sarcastic</option>
                            <option value="blunt">Blunt</option>
                            <option value="deep">Deep</option>
                            <option value="roast">Roast</option>
                            <option value="custom">Custom</option>
                        </select>
                        <span class="material-symbols-outlined select-icon">expand_more</span>
                    </div>
                </div>

                <!-- Number of Variations -->
                <div class="form-group">
                    <div class="slider-header">
                        <label class="font-label-sm" for="variations-slider">Variations per Generation</label>
                        <span class="font-label-md slider-value" id="variations-val">3</span>
                    </div>
                    <div class="slider-container">
                        <input id="variations-slider" max="5" min="1" type="range" value="3">
                    </div>
                </div>

                <!-- Reply Length -->
                <div class="form-group">
                    <label class="font-label-sm" for="length-select">Reply Length</label>
                    <div class="select-wrapper">
                        <select id="length-select" class="font-body-sm">
                            <option value="very_short">Very Short (&lt; 50 chars)</option>
                            <option selected value="short">Short &amp; Concise (&lt; 80 chars)</option>
                            <option value="long">Long (&lt; 150 chars)</option>
                        </select>
                        <span class="material-symbols-outlined select-icon">expand_more</span>
                    </div>
                </div>

                <!-- Custom Instructions -->
                <div class="form-group">
                    <label class="font-label-sm" for="instructions-textarea">
                        Custom Context
                        <span class="material-symbols-outlined info-icon"
                            style="font-variation-settings: 'FILL' 1;">info</span>
                    </label>
                    <textarea id="instructions-textarea" class="font-body-sm"
                        placeholder="e.g. Never use hashtags. Always agree with the original poster first."
                        rows="3"></textarea>
                </div>

                <!-- Divider -->
                <div class="divider"></div>

                <!-- Emoji Toggle -->
                <label class="toggle-label">
                    <div class="toggle-text-container">
                        <span class="font-label-md toggle-title">Include Emojis</span>
                        <span class="font-body-sm toggle-desc">Let AI sprinkle relevant emojis</span>
                    </div>
                    <div class="toggle-wrapper">
                        <input class="sr-only" type="checkbox" checked>
                        <div class="toggle-bg">
                            <div class="toggle-thumb"></div>
                        </div>
                    </div>
                </label>
            </div>

            <!-- Action Button -->
            <div class="action-button-container">
                <button class="action-button font-label-md">
                    <span class="material-symbols-outlined">save</span>
                    Save Settings
                </button>
            </div>
        </main>


    </div>

    <script src="script.js"></script>
</body>

</html>
